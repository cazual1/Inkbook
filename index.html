// ─── SHARED COMPONENTS ────────────────────────────────

function Img({ src, alt, style }) {
  const [loaded, setLoaded] = useState(false);
  return (
    <div style={{ position: "relative", overflow: "hidden", background: V.surface, ...style }}>
      {!loaded && <div style={{ position: "absolute", inset: 0, background: `linear-gradient(135deg, ${V.surface}, ${V.card})` }} />}
      <img
        src={src} alt={alt || ""} loading="lazy"
        onLoad={() => setLoaded(true)}
        style={{ width: "100%", height: "100%", objectFit: "cover", display: "block", opacity: loaded ? 1 : 0, transition: "opacity 0.4s" }}
      />
    </div>
  );
}

function Avatar({ src, size = 36, fallback }) {
  return (
    <div style={{ width: size, height: size, borderRadius: "50%", overflow: "hidden", flexShrink: 0, background: V.surface, border: `2px solid ${V.border}` }}>
      <img src={src} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} loading="lazy" />
    </div>
  );
}

function Pill({ children, active, onClick, style = {} }) {
  return (
    <button onClick={onClick} style={{
      background: active ? V.accent : V.card, color: active ? V.bg : V.mid,
      border: `1px solid ${active ? V.accent : V.border}`, borderRadius: 20,
      padding: "7px 16px", fontSize: 12, fontWeight: 600, fontFamily: V.b,
      cursor: "pointer", whiteSpace: "nowrap", transition: "all 0.15s", ...style,
    }}>{children}</button>
  );
}

            {/* Info */}

      {/* Bio + actions */}
      <div style={{ padding: "14px 16px" }}>
        <p style={{ fontSize: 13, color: V.mid, fontFamily: V.b, lineHeight: 1.65, margin: "0 0 12px" }}>{artist.bio}</p>
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap", marginBottom: 14 }}>
          {artist.styles.map(s => <span key={s} style={{ background: V.accentDim, border: `1px solid ${V.accentBorder}`, borderRadius: 5, padding: "3px 10px", fontSize: 11, color: V.accent, fontFamily: V.b, fontWeight: 600 }}>{s}</span>)}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
          <button onClick={() => setTab("book")} style={{ background: V.accent, color: V.bg, border: "none", borderRadius: 10, padding: "12px 0", fontSize: 12, fontWeight: 700, fontFamily: V.b, cursor: "pointer" }}>📅 Book</button>
          <button style={{ background: V.card, color: V.text, border: `1px solid ${V.border}`, borderRadius: 10, padding: "12px 0", fontSize: 12, fontWeight: 600, fontFamily: V.b, cursor: "pointer" }}>📹 FaceTime</button>
          <button style={{ background: V.card, color: V.text, border: `1px solid ${V.border}`, borderRadius: 10, padding: "12px 0", fontSize: 12, fontWeight: 600, fontFamily: V.b, cursor: "pointer" }}>💬 Chat</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", borderBottom: `1px solid ${V.border}`, padding: "0 16px" }}>
        {tabs.map(t => (
          <button key={t} onClick={() => setTab(t)} style={{
            flex: 1, background: "none", border: "none", padding: "12px 0",
            borderBottom: tab === t ? `2px solid ${V.accent}` : "2px solid transparent",
            fontSize: 12, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase",
            color: tab === t ? V.accent : V.dim, fontFamily: V.b, cursor: "pointer",
          }}>{t === "work" ? "Portfolio" : t === "reviews" ? `Reviews (${artist.reviews})` : "Book Now"}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: "16px" }}>
        {tab === "work" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {artist.portfolio.map((p, i) => (
              <div key={p.id} onClick={() => setLightbox(i)} style={{ cursor: "pointer", borderRadius: 10, overflow: "hidden", border: `1px solid ${V.border}`, background: V.card }}>
                <Img src={p.img} alt={p.title} style={{ height: 160 }} />
                <div style={{ padding: "8px 10px" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: V.text, fontFamily: V.b }}>{p.title}</div>
                  <div style={{ fontSize: 10, color: V.mid, fontFamily: V.b, marginTop: 2 }}>{p.style}</div>
                  <div style={{ display: "flex", gap: 10, marginTop: 6, fontSize: 10, color: V.dim, fontFamily: V.b }}>
                    <span>❤️ {p.likes}</span><span>💬 {p.comments}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {tab === "reviews" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {[
              { user: "sammyinks", avatar: "https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?w=100&h=100&fit=crop&crop=face", rating: 5, text: "Absolutely incredible work. Took my vague idea and turned it into something beyond what I imagined. Healing perfectly at 3 weeks.", time: "2w" },
              { user: "firsttimer_k", avatar: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=100&h=100&fit=crop&crop=face", rating: 5, text: "My first tattoo and I couldn't have picked a better artist. So patient with my questions and made me feel totally comfortable.", time: "1mo" },
              { user: "darksleeves", avatar: "https://images.unsplash.com/photo-1552058544-f2b08422138a?w=100&h=100&fit=crop&crop=face", rating: 4, text: "Great technical skill. The wait time was a bit long but worth it for the quality. Studio is clean and professional.", time: "2mo" },
              { user: "artcollector", avatar: "https://images.unsplash.com/photo-1580489944761-15a19d654956?w=100&h=100&fit=crop&crop=face", rating: 5, text: "Fourth piece from this artist. Consistency is incredible. Every one has healed perfectly and the style keeps evolving.", time: "3mo" },
            ].map((r, i) => (
              <div key={i} style={{ background: V.card, borderRadius: 12, padding: "14px", border: `1px solid ${V.border}` }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                  <Avatar src={r.avatar} size={28} />
                  <span style={{ fontSize: 13, fontWeight: 700, color: V.text, fontFamily: V.b }}>{r.user}</span>
                  <span style={{ fontSize: 11, color: V.accent, marginLeft: "auto" }}>{"★".repeat(r.rating)}<span style={{ color: V.dim }}>{"★".repeat(5 - r.rating)}</span></span>
                  <span style={{ fontSize: 10, color: V.dim, fontFamily: V.b }}>{r.time}</span>
                </div>
                <p style={{ fontSize: 13, color: V.mid, fontFamily: V.b, lineHeight: 1.65, margin: 0 }}>{r.text}</p>
              </div>
            ))}
          </div>
        )}

        {tab === "book" && (
          <div>
            <h3 style={{ fontSize: 20, fontFamily: V.h, color: V.text, letterSpacing: 2, margin: "0 0 12px" }}>PICK A DATE</h3>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, marginBottom: 20 }}>
              {["S","M","T","W","T","F","S"].map((d,i) => (
                <div key={i} style={{ textAlign: "center", fontSize: 10, color: V.dim, fontFamily: V.b, padding: "4px 0" }}>{d}</div>
              ))}
              {Array.from({ length: 28 }, (_, i) => {
                const d = new Date(2026, 3, 1 + i);
                const dn = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
                const avail = artist.availability.includes(dn);
                const sel = selDate === i;
                const past = i < 13;
                return (
                  <button key={i} onClick={() => avail && !past && setSelDate(i)} style={{
                    background: sel ? V.accent : "transparent", color: sel ? V.bg : past ? V.dim : avail ? V.text : V.dim,
                    border: sel ? "none" : "none", borderRadius: 8, padding: "10px 0",
                    fontSize: 13, fontWeight: sel ? 700 : 500, fontFamily: V.b, cursor: avail && !past ? "pointer" : "default",
                    opacity: past ? 0.3 : avail ? 1 : 0.3,
                  }}>{i + 1}</button>
                );
              })}
            </div>

            {selDate !== null && (
              <>
                <h3 style={{ fontSize: 20, fontFamily: V.h, color: V.text, letterSpacing: 2, margin: "0 0 10px" }}>PICK A TIME</h3>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginBottom: 20 }}>
                  {TIMES.map((t, i) => (
                    <button key={i} onClick={() => setSelTime(i)} style={{
                      background: selTime === i ? V.accent : V.card, color: selTime === i ? V.bg : V.text,
                      border: `1px solid ${selTime === i ? V.accent : V.border}`, borderRadius: 10,
                      padding: "12px 0", fontSize: 14, fontWeight: 600, fontFamily: V.m, cursor: "pointer",
                    }}>{t}</button>
                  ))}
                </div>
              </>
            )}

            {selTime !== null && (
              <>
                <h3 style={{ fontSize: 20, fontFamily: V.h, color: V.text, letterSpacing: 2, margin: "0 0 4px" }}>PAYMENT PLAN</h3>
                <p style={{ fontSize: 12, color: V.mid, fontFamily: V.b, margin: "0 0 10px" }}>Est. 3hrs = <span style={{ color: V.accent, fontFamily: V.m, fontWeight: 700 }}>${artist.hourly * 3}</span></p>
                <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
                  {PAYMENT_PLANS.map((p, i) => (
                    <button key={i} onClick={() => setSelPlan(i)} style={{
                      background: selPlan === i ? V.accentDim : V.card,
                      border: `1px solid ${selPlan === i ? V.accent : V.border}`,
                      borderRadius: 12, padding: "14px 16px", textAlign: "left", cursor: "pointer",
                      display: "flex", justifyContent: "space-between", alignItems: "center",
                    }}>
                      <div>
                        <div style={{ fontSize: 14, fontWeight: 700, color: selPlan === i ? V.accent : V.text, fontFamily: V.b }}>{p.name}</div>
                        <div style={{ fontSize: 11, color: V.mid, fontFamily: V.b }}>{p.desc}</div>
                      </div>
                      <div style={{ textAlign: "right" }}>
                        <div style={{ fontSize: 16, fontWeight: 700, color: selPlan === i ? V.accent : V.text, fontFamily: V.m }}>
                          ${Math.round(artist.hourly * 3 / p.split)}
                        </div>
                        {p.split > 1 && <div style={{ fontSize: 10, color: V.mid, fontFamily: V.b }}>×{p.split}</div>}
                        {p.badge && <span style={{ fontSize: 9, fontWeight: 700, color: V.accent, fontFamily: V.b }}>{p.badge}</span>}
                      </div>
                    </button>
                  ))}
                </div>
                <button style={{
                  width: "100%", background: V.accent, color: V.bg, border: "none", borderRadius: 12,
                  padding: "16px 0", fontSize: 16, fontWeight: 700, fontFamily: V.b, cursor: "pointer",
                  letterSpacing: 0.5,
                }}>CONFIRM — ${artist.hourly * 3}</button>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

                {p.text.split(/(@[\w.]+)/g).map((part, j) =>
                  part.startsWith("@") ? <span key={j} style={{ color: V.accent, fontWeight: 600, cursor: "pointer" }} onClick={() => { const a = ARTISTS.find(x => x.handle === part); if (a) onSelect(a); }}>{part}</span> : part
                )}
              </p>
              {p.artistId && (() => { const a = ARTISTS.find(x => x.id === p.artistId); return a ? (
                <div onClick={() => onSelect(a)} style={{
                  background: V.surface, borderRadius: 10, padding: "8px 12px", display: "flex",
                  alignItems: "center", gap: 8, border: `1px solid ${V.border}`, cursor: "pointer", marginBottom: 10,

                <span>❤️ {p.likes}</span><span>💬 {p.replies}</span><span>↗️</span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────
function InkBook() {
  const [page, setPage] = useState("discover");
  const [artist, setArtist] = useState(null);

  const selectArtist = (a) => { setArtist(a); setPage("artist"); };

  return (
    <div style={{ minHeight: "100vh", background: V.bg, maxWidth: 480, margin: "0 auto", position: "relative", overflow: "hidden" }}>
      <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
      {/* Grain */}
      <div style={{ position: "fixed", inset: 0, backgroundImage: GRAIN_SVG, backgroundRepeat: "repeat", backgroundSize: 512, pointerEvents: "none", zIndex: 9999, mixBlendMode: "overlay" }} />

      <Nav page={artist ? "artist" : page} setPage={setPage} setArtist={setArtist} />

      {artist ? (
        <Profile artist={artist} onBack={() => { setArtist(null); setPage("discover"); }} />
      ) : page === "discover" ? (
        <Discover onSelect={selectArtist} />
      ) : page === "community" ? (
        <Community onSelect={selectArtist} />
      ) : page === "bookings" ? (
        <Bookings />
      ) : page === "profile" ? (
        <UserProfile />
      ) : null}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<InkBook />);
